<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="js/app.js" defer></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <title>Document</title>
</head>
<body>
    <div id="telaPrincipal">
        <h1><i class="bi bi-mouse-fill"></i>LogiTech S.A.</h1>
        <div class="container-box">
            <h2><i class="bi bi-calendar"></i>Dados do Agendamento</h2>
            <form class="was-validated" id="formulario">

                <!-- Selects e input -->
                <div class="container text-center">
                    <div class="box-container">
                        <div class="flex">
                            <label for="setor">Setor</label>
                            <select class="form-select" required aria-label="select example" id="setor">
                                <option value="" selected disabled>Selecione o Setor</option>
                                <option value="TI">TI</option>
                                <option value="RH">RH</option>
                                <option value="FINANCEIRO">FINANCEIRO</option>
                                <option value="PRODUÇÃO">PRODUÇÃO</option>
                            </select>
                        </div>
                            <div class="flex">
                                <label for="sala">Sala</label>
                                <select class="form-select" required aria-label="select example" id="sala">
                                    <option value="" selected disabled>Selecione a sala</option>
                                    <option value="sala1">SALA 1</option>
                                   <option value="lab1">LAB 1</option>
                                    <option value="reuniaoA">Reunião A</option>
                                    <option value="auditorio">Auditório</option>
                                </select>
                            </div>
                        </div>

                        <div class="input-style">
                            <span>Responsável</span>
                            <input class="form-control is-valid" type="text" name="texto" id="nameresponsavel" placeholder="Nome da pessoa que retirou a chave" required>
                        </div>

                        <!-- Radio Turno -->
                        <div class="container text-center">
                            <div class="row" id="turno">
                                <div class="col">
                                    <input type="radio" name="escolha" id="manha" class="form-check-input" value="MANHÃ" required>
                                    <label class="form-check-label" for="manha"><i class="bi bi-brightness-high"></i> Manhã</label>
                                </div>
                                <div class="col">
                                    <input type="radio" name="escolha" id="tarde" class="form-check-input" value="TARDE" required>
                                    <label class="form-check-label" for="tarde"><i class="bi bi-brightness-high"></i> Tarde</label>
                                </div>
                                
                                <div class="col form-check-label">
                                    <input type="radio" name="escolha" id="noite" class="form-check-input" value="NOITE" required>
                                    <label class="form-check-label" for="noite"><i class="bi bi-moon"></i> Noite</label>
                            </div>
                        </div>
                        <div class="box-container"> 
                            <div class="flex">
                                <label for="dataRetirada">Hora de Retirada</label>
                                <input type="time" name="time" id="dataRetirada" class="form-control is-valid" required>
                            </div>
                            <div class="flex">
                                <label for="dataEntrada">Hora de Entrega</label>
                                <input type="time" name="time" id="dataEntrada" class="form-control is-valid" required>
                            </div>
                        </div>
                    </div>                                                          
                </div> 
                <table class="table active">
                    <thead>
                        <tr>
                        <th scope="col">#</th>
                        <th scope="col">Setor</th>
                        <th scope="col">Sala</th>
                        <th scope="col">Responsável</th>
                        <th scope="col">Turno</th>
                        <th scope="col">Hora de Retirada</th>
                        <th scope="col">Hora de Entrega</th>
                        <th scope="col">Ação</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
                <div class="d-grid gap-2 d-md-flex justify-content-md-end" id="confirmar">
                    <div class="col-12">
                        <button class="btn btn-primary" type="submit">Confirmar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
